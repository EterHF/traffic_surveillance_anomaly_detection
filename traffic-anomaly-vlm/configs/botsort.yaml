# BoT-SORT tracker defaults for mode="track"
# Docs: https://docs.ultralytics.com/modes/track/

tracker_type: botsort # (str) Tracker backend: botsort|bytetrack; choose botsort to enable BoT-SORT features
track_high_thresh: 0.4 # (float) First-stage match threshold; keep confident matches clean
track_low_thresh: 0.05 # (float) Second-stage threshold; keep weak detections for continuity
new_track_thresh: 0.60 # (float) Require stronger unmatched detections before starting a new ID
track_buffer: 75 # (int) Keep lost tracks longer to bridge short occlusions/missed detections
match_thresh: 0.75 # (float) More permissive association to reduce fragmented IDs
fuse_score: True # (bool) Fuse detection score with motion/IoU for matching; stabilizes weak detections

# BoT-SORT specifics
gmc_method: sparseOptFlow # (str) Global motion compensation: sparseOptFlow|orb|sift|ecc|none; helps moving camera scenes

# ReID model related thresh
proximity_thresh: 0.50 # (float) Allow ReID at larger displacements after brief occlusion
appearance_thresh: 0.70 # (float) Moderate appearance gate; raise if different objects merge
with_reid: True # (bool) Enable ReID model use; needs extra model and compute
model: auto # (str) ReID model name/path; "auto" uses detector features if available
