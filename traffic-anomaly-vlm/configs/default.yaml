video:
  input_fps: 25
  fps_sample: 12
  resize_max_side: 640
  resize_interpolation: "area"
  window_size: 8
  window_step: 1
  SAVE_ALL_TRACKS: true
  PLOT_ALL_SUBSCORES: true
  SAVE_TRACK_VIDEOS: true


score_postprocess:
  smooth_window: 3

perception:
  model_path: "weights/yolo26/yolo26x.pt"
  tracker: "configs/botsort.yaml"
  conf: 0.2
  iou: 0.5
  classes: [0, 1, 2, 3, 5, 6, 7]

track_refiner:
  enable: true
  max_frame_gap: 6
  max_center_dist: 0.06
  max_size_ratio: 2.5
  min_direction_cos: -0.1
  max_speed_ratio: 3.5
  gap_relax_factor: 0.20
  min_track_len: 6
  min_track_span: 12
  min_box_area: 20.0
  min_area_ratio: 0.0005

track_features:
  fit_degree: 2
  # null means use current window_size
  history_len: null

vlm:
  enable: true
  model_path: "/nvme2/VAD_yemao/traffic-anomaly-vlm/weights/qwen3-vl-4bi"
  device: "cuda:0"
  dtype: "float16"
  max_new_tokens: 4096
  max_image_size: 640

pure_vlm_baseline:
  window_size: 60
  window_stride: 45
  max_stride_ratio: 0.75
  chunks_per_window: 4
  sampled_frames_per_chunk: 4
  max_image_size: 640
  smoothing_mode: "savgol"
  savgol_window: 11
  savgol_polyorder: 2
  ma_window: 9
  threshold: 0.5
  min_interval_len: 10
  merge_gap: 8

scene_features:
  lowres_size: 32
  occupancy_grid: 4

  clip_model_name: "/nvme2/VAD_yemao/traffic-anomaly-vlm/weights/clip-vit-base-patch32"
  clip_model_revision: null
  clip_device: "cuda:0"
  clip_batch_size: 16
  clip_resize_long_side: 640
  clip_resize_interpolation: "area"

  raft_root: "/nvme2/VAD_yemao/traffic-anomaly-vlm/src/features/RAFT"
  raft_weights: "/nvme2/VAD_yemao/traffic-anomaly-vlm/weights/raft/raft-things.pth"
  raft_device: "cuda:0"
  raft_iters: 12
  raft_resize_long_side: 640
  raft_resize_interpolation: "area"
  raft_flow_proj_dim: 128
  raft_flow_proj_seed: 42

output:
  save_assets: true
  save_json: true
  output_dir: "outputs/test"

evaluation:
  manifest_path: "/nvme2/VAD_yemao/data/TU-DAT-25/abnormal.txt"

tree_build_config:
  max_depth: 3
  min_span_len: 8
  split_min_len: 16
  peak_gap: 5
  peak_expand: [10, 15]
  merge_gap: 10
  per_level_high_z: [1.0, 0.6, 0.3]
  min_output_span: 8
  refine_coarse: true
  prompt_method: "single_stage" # "single_stage" or "two_stage"

tree_refine_config:
  min_confidence: 0.35
  prior_weight: 0.4
  vlm_weight: 0.6
  positive_threshold: 0.5

boundary_detector:
  # Start from median + high_z * MAD-sigma, then relax/trim peak count.
  high_z: 0.85
  # Null-aware gate may produce no reliable evidence; avoid forcing noise peaks.
  min_peak_score: 0.15
  min_peaks: 5
  max_peaks: 10
  # Peak-centered spans, in sampled-frame units.
  peak_gap: 2
  peak_expand: [8, 12]
  # Greedy de-duplication: overlapping spans, or spans within this gap, keep one.
  merge_gap: 0

evidence_builder:
  assets_subdir: "assets"
  method: "montage" # "montage", "frames", or "enhanced"
