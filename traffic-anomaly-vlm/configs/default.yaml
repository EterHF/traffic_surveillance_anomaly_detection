video:
  input_fps: 25
  fps_sample: 25
  resize_max_side: 640
  resize_interpolation: "area"
  window_size: 16
  window_step: 1

perception:
  model_path: "weights/yolo26n.pt"
  tracker: "bytetrack.yaml"
  conf: 0.25
  iou: 0.5
  classes: [0, 1, 2, 3, 5, 7]

track_refiner:
  enable: true
  max_frame_gap: 8
  max_center_dist: 0.06
  max_size_ratio: 2.5
  min_direction_cos: -0.1
  max_speed_ratio: 3.5
  gap_relax_factor: 0.20

vlm:
  enable: true
  model_path: "/nvme2/VAD_yemao/traffic-anomaly-vlm/weights/qwen3-vl-4bi"
  device: "cuda:0"
  dtype: "float16"
  max_new_tokens: 4096
  max_image_size: 640

pure_vlm_baseline:
  window_size: 60
  window_stride: 45
  max_stride_ratio: 0.75
  chunks_per_window: 4
  sampled_frames_per_chunk: 4
  max_image_size: 640
  smoothing_mode: "savgol"
  savgol_window: 11
  savgol_polyorder: 2
  ma_window: 9
  threshold: 0.5
  min_interval_len: 10
  merge_gap: 8

track_features:
  fit_degree: 3
  # null means use current window_size
  history_len: null

scene_features:
  lowres_size: 32
  occupancy_grid: 4

  clip_model_name: "/nvme2/VAD_yemao/traffic-anomaly-vlm/weights/clip-vit-base-patch32"
  clip_model_revision: null
  clip_device: "cuda:0"
  clip_batch_size: 16
  clip_resize_long_side: 640
  clip_resize_interpolation: "area"

  raft_root: "/nvme2/VAD_yemao/traffic-anomaly-vlm/src/features/RAFT"
  raft_weights: "/nvme2/VAD_yemao/traffic-anomaly-vlm/weights/raft/raft-things.pth"
  raft_device: "cuda:0"
  raft_iters: 12
  raft_resize_long_side: 640
  raft_resize_interpolation: "area"
  raft_flow_proj_dim: 128
  raft_flow_proj_seed: 42

output:
  save_assets: true
  save_json: true
  output_dir: "outputs/"

tree_build_config:
  max_depth: 3
  min_span_len: 8
  split_min_len: 16
  peak_gap: 5
  peak_expand: [10, 15]
  merge_gap: 10
  per_level_high_z: [1.0, 0.6, 0.3]
  min_output_span: 8
  use_savgol_filter: false
  refine_coarse: true
  prompt_method: "single_stage"

tree_refine_config:
  min_confidence: 0.35,
  prior_weight: 0.4
  vlm_weight: 0.6

boundary_detector:
  high: null
  low: null
  online: false
  use_savgol_filter: false
  method: "by_peeks"
  # Robust z-score parameters for adaptive thresholding.
  high_z: 1.0
  low_z: 0.5
  factor_online: 0.3
  # Peak/span post-process parameters.
  peak_gap: 5
  peak_expand: [12, 25]
  min_span_len: 12
  merge_gap: 25
  savgol_window: 7
  savgol_polyorder: 3

evidence_builder:
  assets_subdir: "assets"
  method: "montage" # "montage" or "enhanced"
